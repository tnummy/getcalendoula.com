<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendoula — Spa & Wellness Management</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #fef9f3 0%, #f0e6d8 50%, #e8ddd0 100%);
      color: #3a3028;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 520px;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: #2c2418;
    }
    .tagline {
      font-size: 1.15rem;
      color: #6b5d4f;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      background: rgba(184, 98, 62, 0.12);
      color: #b8623e;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .divider {
      width: 48px;
      height: 2px;
      background: #c9b8a8;
      margin: 2rem auto;
      border-radius: 1px;
    }
    .contact {
      font-size: 0.95rem;
      color: #8a7b6b;
    }
    .contact a {
      color: #b8623e;
      text-decoration: none;
    }
    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.png" alt="Calendoula" class="logo">
    <h1>Calendoula</h1>
    <p class="tagline">The all-in-one platform for spa &amp; wellness businesses. Booking, clients, sales, marketing, and more.</p>
    <span class="badge">Coming Soon</span>
    <div class="divider"></div>
    <p class="contact">Get in touch: <a href="mailto:hello@getcalendoula.com">hello@getcalendoula.com</a></p>
  </div>
</body>
</html>
